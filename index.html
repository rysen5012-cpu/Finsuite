<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FinSuite</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
  --bg:#050510;
  --card:#121222;
  --card2:#18182b;
  --border:#25253d;
  --text:#ffffff;
  --muted:#9494ad;
  --accent:#6c63ff;
  --accent2:#38bdf8;
  --green:#3ecf8e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  width:240px;
  background:rgba(10,10,20,.96);
  border-right:1px solid var(--border);
  padding:24px 16px;
  z-index:100;
  overflow-y:auto;
}

.logo{
  font-family:'Syne',sans-serif;
  font-size:38px;
  font-weight:800;
  line-height:1;
  margin-bottom:30px;

  background:linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.logo-sub{
  color:var(--muted);
  font-size:12px;
  margin-top:8px;
  margin-bottom:34px;
}

.nav-btn{
  width:100%;
  border:none;
  background:transparent;
  color:var(--muted);
  padding:16px 18px;
  margin-bottom:12px;
  border-radius:18px;
  text-align:left;
  cursor:pointer;
  font-size:15px;
  font-weight:600;
  transition:.3s;
}

.nav-btn:hover{
  background:rgba(255,255,255,.05);
  color:white;
}

.nav-btn.active{
  background:linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

  color:white;

  box-shadow:
  0 10px 30px rgba(108,99,255,.35);
}

/* MAIN */

.main{
  margin-left:240px;
  padding:36px;
}

.section{
  display:none;
  animation:fade .35s ease;
}

.section.active{
  display:block;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(12px);
  }
  to{
    opacity:1;
    transform:none;
  }
}

.title{
  font-family:'Syne',sans-serif;
  font-size:54px;
  margin-bottom:28px;
}

.card{
  background:
  linear-gradient(
    180deg,
    var(--card),
    var(--card2)
  );

  border:1px solid var(--border);
  border-radius:28px;
  padding:26px;
}

.field{
  margin-bottom:22px;
}

.label{
  display:block;
  margin-bottom:10px;
  color:var(--muted);
  font-size:14px;
}

.input{
  width:100%;
  height:60px;
  border:none;
  outline:none;
  border-radius:18px;
  background:#1c1c31;
  color:white;
  padding:0 18px;
  font-size:18px;
}

.btn{
  width:100%;
  border:none;
  height:60px;
  border-radius:18px;

  background:
  linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

  color:white;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:translateY(-2px);
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-top:28px;
}

.stat{
  background:#18182d;
  border:1px solid var(--border);
  border-radius:22px;
  padding:22px;
}

.stat-label{
  color:var(--muted);
  margin-bottom:12px;
  font-size:13px;
}

.stat-value{
  font-size:28px;
  font-weight:700;
}

.chart-wrap{
  display:flex;
  justify-content:center;
  margin-top:34px;
}

canvas{
  max-width:240px !important;
  max-height:240px !important;
}

/* MOBILE */

@media(max-width:900px){

  .sidebar{
    position:relative;
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px solid var(--border);
  }

  .main{
    margin-left:0;
    padding:20px;
  }

  .title{
    font-size:40px;
  }

  .stats{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <div class="logo">
    FinSuite
  </div>

  <div class="logo-sub">
    Modern Fintech Dashboard
  </div>

  <button class="nav-btn active"
  onclick="showSection('sip',this)">
    📈 SIP Calculator
  </button>

  <button class="nav-btn"
  onclick="showSection('emi',this)">
    🏦 EMI Calculator
  </button>

  <button class="nav-btn"
  onclick="showSection('cagr',this)">
    📊 CAGR Calculator
  </button>

  <button class="nav-btn"
  onclick="showSection('goal',this)">
    🎯 Goal Planner
  </button>

</div>

<!-- MAIN -->

<div class="main">

  <!-- SIP -->

  <section id="sip" class="section active">

    <div class="title">
      SIP Calculator
    </div>

    <div class="card">

      <div class="field">
        <label class="label">
          Monthly Investment
        </label>

        <input
        type="number"
        class="input"
        id="sipAmount"
        value="5000">
      </div>

      <div class="field">
        <label class="label">
          Expected Return (%)
        </label>

        <input
        type="number"
        class="input"
        id="sipRate"
        value="12">
      </div>

      <div class="field">
        <label class="label">
          Time Period (Years)
        </label>

        <input
        type="number"
        class="input"
        id="sipYears"
        value="20">
      </div>

      <button class="btn"
      onclick="calcSIP()">
        Calculate SIP
      </button>

      <div class="stats">

        <div class="stat">
          <div class="stat-label">
            Invested
          </div>

          <div class="stat-value"
          id="sipInvested">
            ₹0
          </div>
        </div>

        <div class="stat">
          <div class="stat-label">
            Returns
          </div>

          <div class="stat-value"
          id="sipReturns">
            ₹0
          </div>
        </div>

        <div class="stat">
          <div class="stat-label">
            Total
          </div>

          <div class="stat-value"
          id="sipTotal">
            ₹0
          </div>
        </div>

      </div>

      <div class="chart-wrap">
        <canvas id="sipChart"></canvas>
      </div>

    </div>

  </section>

  <!-- EMI -->

  <section id="emi" class="section">

    <div class="title">
      EMI Calculator
    </div>

    <div class="card">

      <div class="field">
        <label class="label">
          Loan Amount
        </label>

        <input
        type="number"
        class="input"
        id="loanAmount"
        value="1000000">
      </div>

      <div class="field">
        <label class="label">
          Interest Rate (%)
        </label>

        <input
        type="number"
        class="input"
        id="loanRate"
        value="9">
      </div>

      <div class="field">
        <label class="label">
          Loan Tenure (Years)
        </label>

        <input
        type="number"
        class="input"
        id="loanYears"
        value="20">
      </div>

      <button class="btn"
      onclick="calcEMI()">
        Calculate EMI
      </button>

      <div class="stats">

        <div class="stat">
          <div class="stat-label">
            EMI
          </div>

          <div class="stat-value"
          id="emiValue">
            ₹0
          </div>
        </div>

        <div class="stat">
          <div class="stat-label">
            Interest
          </div>

          <div class="stat-value"
          id="emiInterest">
            ₹0
          </div>
        </div>

        <div class="stat">
          <div class="stat-label">
            Total
          </div>

          <div class="stat-value"
          id="emiTotal">
            ₹0
          </div>
        </div>

      </div>

    </div>

  </section>

  <!-- CAGR -->

  <section id="cagr" class="section">

    <div class="title">
      CAGR Calculator
    </div>

    <div class="card">

      <div class="field">
        <label class="label">
          Initial Investment
        </label>

        <input
        type="number"
        class="input"
        id="cagrInitial"
        value="100000">
      </div>

      <div class="field">
        <label class="label">
          Final Value
        </label>

        <input
        type="number"
        class="input"
        id="cagrFinal"
        value="400000">
      </div>

      <div class="field">
        <label class="label">
          Years
        </label>

        <input
        type="number"
        class="input"
        id="cagrYears"
        value="10">
      </div>

      <button class="btn"
      onclick="calcCAGR()">
        Calculate CAGR
      </button>

      <div class="stats">

        <div class="stat">
          <div class="stat-label">
            CAGR
          </div>

          <div class="stat-value"
          id="cagrValue">
            0%
          </div>
        </div>

      </div>

    </div>

  </section>

  <!-- GOAL -->

  <section id="goal" class="section">

    <div class="title">
      Goal Planner
    </div>

    <div class="card">

      <div class="field">
        <label class="label">
          Goal Amount
        </label>

        <input
        type="number"
        class="input"
        id="goalTarget"
        value="10000000">
      </div>

      <div class="field">
        <label class="label">
          Expected Return (%)
        </label>

        <input
        type="number"
        class="input"
        id="goalRate"
        value="12">
      </div>

      <div class="field">
        <label class="label">
          Time Period (Years)
        </label>

        <input
        type="number"
        class="input"
        id="goalYears"
        value="15">
      </div>

      <button class="btn"
      onclick="calcGoal()">
        Calculate Goal SIP
      </button>

      <div class="stats">

        <div class="stat">
          <div class="stat-label">
            Required SIP
          </div>

          <div class="stat-value"
          id="goalSip">
            ₹0
          </div>
        </div>

      </div>

    </div>

  </section>

</div>

<script>

function showSection(id,btn){

  document
  .querySelectorAll('.section')
  .forEach(sec=>{
    sec.classList.remove('active');
  });

  document
  .getElementById(id)
  .classList.add('active');

  document
  .querySelectorAll('.nav-btn')
  .forEach(b=>{
    b.classList.remove('active');
  });

  btn.classList.add('active');
}

function format(x){
  return '₹' +
  Math.round(x)
  .toLocaleString('en-IN');
}

/* SIP */

let sipChart;

function calcSIP(){

  const P =
  parseFloat(
    document.getElementById('sipAmount').value
  );

  const annual =
  parseFloat(
    document.getElementById('sipRate').value
  );

  const years =
  parseFloat(
    document.getElementById('sipYears').value
  );

  const r = annual/12/100;
  const n = years*12;

  const total =
  P *
  ((Math.pow(1+r,n)-1)/r) *
  (1+r);

  const invested = P*n;
  const returns = total-invested;

  document.getElementById(
    'sipInvested'
  ).innerText = format(invested);

  document.getElementById(
    'sipReturns'
  ).innerText = format(returns);

  document.getElementById(
    'sipTotal'
  ).innerText = format(total);

  const ctx =
  document.getElementById('sipChart');

  if(sipChart){
    sipChart.destroy();
  }

  sipChart = new Chart(ctx,{

    type:'doughnut',

    data:{
      labels:['Invested','Returns'],
      datasets:[{
        data:[invested,returns],
        backgroundColor:[
          '#7c7cff',
          '#3ecf8e'
        ],
        borderWidth:0
      }]
    },

    options:{
      cutout:'72%',
      plugins:{
        legend:{
          labels:{
            color:'white'
          }
        }
      }
    }

  });

}

/* EMI */

function calcEMI(){

  const P =
  parseFloat(
    document.getElementById('loanAmount').value
  );

  const annual =
  parseFloat(
    document.getElementById('loanRate').value
  );

  const years =
  parseFloat(
    document.getElementById('loanYears').value
  );

  const r = annual/12/100;
  const n = years*12;

  const emi =
  (P*r*Math.pow(1+r,n)) /
  (Math.pow(1+r,n)-1);

  const total = emi*n;
  const interest = total-P;

  document.getElementById(
    'emiValue'
  ).innerText = format(emi);

  document.getElementById(
    'emiInterest'
  ).innerText = format(interest);

  document.getElementById(
    'emiTotal'
  ).innerText = format(total);
}

/* CAGR */

function calcCAGR(){

  const initial =
  parseFloat(
    document.getElementById('cagrInitial').value
  );

  const final =
  parseFloat(
    document.getElementById('cagrFinal').value
  );

  const years =
  parseFloat(
    document.getElementById('cagrYears').value
  );

  const cagr =
  (
    (Math.pow(final/initial,1/years)-1)
    *100
  ).toFixed(2);

  document.getElementById(
    'cagrValue'
  ).innerText = cagr + '%';
}

/* GOAL */

function calcGoal(){

  const target =
  parseFloat(
    document.getElementById('goalTarget').value
  );

  const annual =
  parseFloat(
    document.getElementById('goalRate').value
  );

  const years =
  parseFloat(
    document.getElementById('goalYears').value
  );

  const r = annual/12/100;
  const n = years*12;

  const sip =
  target /
  (
    ((Math.pow(1+r,n)-1)/r)
    * (1+r)
  );

  document.getElementById(
    'goalSip'
  ).innerText = format(sip);
}

/* INITIAL */

calcSIP();
calcEMI();
calcCAGR();
calcGoal();

</script>

</body>
</html>
